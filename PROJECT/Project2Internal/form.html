<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
<center>
    
    <form class="forms">

            <fieldset>
            <legend>Form for parcel delivery</legend>
            
            <table>
            


              

              <tr>
                <td> <label>Enter Parcel Type</label></td>
                <td>
                    <input type="checkbox" name="delivery" required  />Documents 
                    <input type="checkbox" name="delivery"   /> Electronics
                    <input type="checkbox" name="delivery"    /> Clothes
                    <input type="checkbox" name="delivery"    />Others

                    

                    


                </td>


            </tr>

            <tr>
                <td> <label>Enter Parcel Weight</label></td>
                <td><input type="number"  required> </td>


            </tr>

            <tr>
                <td> <label>Description of Parcel</label></td>
                <td>
                    <textarea >

                    </textarea>
                </td>


            </tr>

             <tr>
                <td> <label>Enter delievery Type </label></td>
                <td>
                    <input type="radio" name="parcel"   />Standard delivery 
                    <input type="radio" name="parcel"   /> Express delivery
                    <input type="radio" name="parcel"    /> SameDay delivery
                    
                    



                </td>

                </tr>

              <tr>
                <td> <label>Enter Pickup Date</label></td>
                <td><input type="date" required> </td>


            </tr>

            </tr>

              <tr>
                <td> <label>Enter Pickup Time</label></td>
                <td><input type="time" required> </td>


            </tr>

            

            <tr>
                <td> <label>Enter Payment mode</label></td>
                <td>
                    <select >
                        <option value="" selected disabled>choose one</option>

                        <option value="">Credit card</option>
                        <option value="">UPI</option>
                        <option value="">Cash on delivery</option>
                        

                    </select>




                </td>


            </tr>

                
                <td>
                    <button type="submit"></button>
                    <input type="reset" name="Reset">
                </td>
                

            </tr>


            


        </table>

        </fieldset>

      
        
    </form>

    
    </center>
   
    
</body>
</html>
