//  Embed video, audio, and Google Maps.

<!DOCTYPE html>
<html>
<head>
  <title>Media Example</title>
</head>
<body>
<h2>Video</h2>
<video width="300" controls>
  <source src="video.mp4" type="video/mp4">
</video>

<h2>Audio</h2>
<audio controls>
  <source src="audio.mp3" type="audio/mp3">
</audio>

<h2>Google Map</h2>
<iframe
  src="https://www.google.com/maps" width="300" height="200">
</iframe>

</body>
</html>
