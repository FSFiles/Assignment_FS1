//Create a table with rowspan & colspan for a timetable.

<!DOCTYPE html>
<html>
<body>
<table border="1" cellpadding="10">

<tr>
  <th>Day</th>
  <th>9-10</th>
  <th>10-11</th>
  <th>11-12</th>
</tr>

<tr>
  <td>Monday</td>
  <td>Maths</td>
  <td colspan="2">Lab</td>
</tr>

<tr>
  <td>Tuesday</td>
  <td rowspan="2">English</td>
  <td>Science</td>
  <td>HTML</td>
</tr>

<tr>
  <td>Wednesday</td>
  <td>CSS</td>
  <td>Java</td>
</tr>
</table>

</body>
</html>
